<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Webamp Player</title>

  <script src="https://unpkg.com/webamp@latest/built/webamp.bundle.min.js"></script>

  <style>
   .side-gif {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      width: 120px;
      height: 600px;   /* makes it very tall (1:5-ish) */
      object-fit: fill; /* IMPORTANT: forces distortion/stretch */
      z-index: 10;
    }

    .left {
      left: 20px;     /* distance from left edge */
    }
    .left-second {
      left: 40px;    /* distance from right edge */
    }
    
    .left-second {
      left: 60px;    /* distance from right edge */
    }

    .right {
      right: 20px;    /* distance from right edge */
    }
    
    .right-second {
      right: 40px;    /* distance from right edge */
    }
    
    .right-second {
      right: 60px;    /* distance from right edge */
    }
    
    body {
      margin: 0;
      height: 100vh;
      background-image: url("./pics/1064.GIF");
      display: flex;
      flex-direction: column;
      font-family: Arial, sans-serif;
      color: white;
    }

    /* Header area */
    header {
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: bold;
      border-bottom: 1px solid #333;
    }

    /* Main area centers Webamp */
    #main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>

<body>
  <header>
    My Webamp Player
  </header>

  <img src="./pics/left_smiley.gif" class="side-gif left">
  <img src="./pics/left_smiley.gif" class="side-gif left_second">
  <img src="./pics/left_smiley.gif" class="side-gif left_third">
  <img src="./pics/right_smiley.gif" class="side-gif right">
  <img src="./pics/right_smiley.gif" class="side-gif right_second">
