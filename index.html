<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Webamp Player</title>

  <script src="https://unpkg.com/webamp@latest/built/webamp.bundle.min.js"></script>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #1e1e1e;
      font-family: Arial, sans-serif;
      color: white;
    }

    /* Header area */
    header {
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: bold;
      border-bottom: 1px solid #333;
    }

    /* Main area centers Webamp */
    #main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>

<body>
  <header>
    My Webamp Player
  </header>

  <div id="main">
    <div id="app"></div>
  </div>

  <script>
    const Webamp = window.Webamp;

    const webamp = new Webamp({
      initialTracks: [
        {
          metaData: {
            artist: "DJ Mike Llama",
            title: "Llama Whippin' Intro"
          },
          url: "https://cdn.jsdelivr.net/gh/captbaritone/webamp@43434d82cfe0e37286dbbe0666072dc3190a83bc/mp3/llama-2.91.mp3",
          duration: 5.322286
        }
      ]
    });

    webamp.renderWhenReady(document.getElementById("app"));
  </script>
</body>
</html>
